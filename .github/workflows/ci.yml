name: CI

on:
  push:
    branches: [main, "m*"]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/ bench/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/divergencelens/ --ignore-missing-imports || true

      - name: Unit tests
        run: uv run pytest tests/unit/ -q --tb=short

      - name: Smoke tests
        run: uv run pytest tests/smoke/ -q --tb=short
